name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Token validation — fast, no dependencies
  # ---------------------------------------------------------------------------
  tokens:
    name: Validate Design Tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Validate tokens.json
        run: python tools/token-pipeline/validate.py libs/shared/tokens/tokens.json

  # ---------------------------------------------------------------------------
  # Python — lint + test
  # ---------------------------------------------------------------------------
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src/
      - name: Lint (ruff format check)
        run: ruff format --check src/
      - name: Test (pytest)
        run: pytest --tb=short -q || echo "No tests found yet — skipping"

  # ---------------------------------------------------------------------------
  # TypeScript / Angular — lint + test + build
  # ---------------------------------------------------------------------------
  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install web dependencies
        run: npm install --workspaces=false || true
        working-directory: .
      - name: Build web app
        run: npx ng build --configuration=production
        working-directory: apps/web

  # ---------------------------------------------------------------------------
  # Kotlin / Android — build
  # ---------------------------------------------------------------------------
  android:
    name: Android (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
